<!DOCTYPE html>
<html>
<head>
  <title>Food Resources Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([39.7392, -104.9903], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// THIS WILL LOAD YOUR DATA NEXT
fetch('data.geojson')
  .then(response => response.json())
  .then(data => {
    L.geoJSON(data, {
      onEachFeature: function (feature, layer) {
        layer.bindPopup(
  "<strong>" + (feature.properties.Name || "No name") + "</strong><br>" +
  (feature.properties.Category || "") + "<br><br>" +

  (feature.properties["Street Address"] || "") + "<br>" +
  (feature.properties.City || "") + ", " +
  (feature.properties.State || "") + " " +
  (feature.properties.ZIP || "") + "<br><br>" +

  (feature.properties.Hours ? "<strong>Hours:</strong> " + feature.properties.Hours + "<br>" : "") +
  (feature.properties.Phone ? "<strong>Phone:</strong> " + feature.properties.Phone + "<br>" : "") +
  (feature.properties.Website ? "<a href='" + feature.properties.Website + "' target='_blank'>Website</a><br>" : "") +
  (feature.properties["Description / Notes"] ? "<em>" + feature.properties["Description / Notes"] + "</em><br>" : "") +
  (feature.properties.Eligibility ? "<strong>Eligibility:</strong> " + feature.properties.Eligibility : "")
);
      }
    }).addTo(map);
  });

</script>

</body>
</html>
